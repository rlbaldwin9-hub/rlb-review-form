<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader Reviews | RLB Designs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:    #7a9e7e;
      --sage-dk: #3d5c40;
      --sage-lt: #e8f2e9;
      --gold:    #c8a96e;
      --gold-lt: #f5eddb;
      --cream:   #f5f0e8;
      --text:    #2c2c2a;
      --muted:   #6b6b68;
      --border:  #c8a96e44;
      --white:   #ffffff;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(160deg, var(--sage-dk) 0%, #2a4a2d 100%);
      padding: 3.5rem 1.5rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    }

    .hero-logo {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(200,169,110,0.5);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 22px;
      color: var(--gold); margin: 0 auto 1.25rem; position: relative;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 600; color: var(--cream);
      margin-bottom: 0.5rem; position: relative;
    }

    .hero p {
      font-size: 13px; color: rgba(245,240,232,0.65);
      letter-spacing: 0.12em; font-weight: 300; position: relative;
    }

    .hero-divider {
      width: 50px; height: 1px; background: var(--gold);
      margin: 1.25rem auto 0; position: relative;
    }

    /* ── Summary bar ── */
    .summary-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex; align-items: center;
      justify-content: center; gap: 2rem; flex-wrap: wrap;
    }

    .summary-stat { text-align: center; }

    .summary-stat .num {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 600;
      color: var(--sage-dk); line-height: 1;
    }

    .summary-stat .lbl {
      font-size: 11px; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px;
    }

    .summary-stars { color: var(--gold); font-size: 20px; letter-spacing: 2px; }
    .summary-divider { width: 1px; height: 36px; background: var(--border); }

    /* ── Main ── */
    .main { max-width: 1080px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* ── Type tabs (top level) ── */
    .type-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .type-tab {
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      border-radius: 30px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; background: var(--white);
      color: var(--muted);
      font-family: 'Lato', sans-serif;
      transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 7px;
    }

    .type-tab .tab-icon { font-size: 16px; }
    .type-tab .tab-count {
      background: var(--sage-lt); color: var(--sage-dk);
      font-size: 10px; font-weight: 700;
      padding: 1px 7px; border-radius: 10px;
    }

    .type-tab:hover { border-color: var(--sage); color: var(--sage-dk); }

    .type-tab.active {
      background: var(--sage-dk); color: var(--cream);
      border-color: var(--sage-dk);
    }

    .type-tab.active .tab-count {
      background: rgba(255,255,255,0.2); color: var(--cream);
    }

    /* ── Sub-category filter bar (shown under books) ── */
    .sub-filter {
      display: none;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 1.5rem;
    }

    .sub-filter.visible { display: block; }

    .sub-filter-inner { display: flex; gap: 8px; white-space: nowrap; }

    .sub-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px; cursor: pointer;
      color: var(--muted); background: var(--white);
      font-family: 'Lato', sans-serif;
      transition: all 0.15s;
    }

    .sub-btn:hover { border-color: var(--sage); color: var(--sage-dk); }

    .sub-btn.active {
      background: var(--sage); color: var(--cream);
      border-color: var(--sage); font-weight: 700;
    }

    /* ── Review grid ── */
    .review-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.25rem;
    }

    /* ── Review card ── */
    .review-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.85rem;
      transition: box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.35s ease both;
    }

    .review-card:hover {
      box-shadow: 0 6px 24px rgba(61,92,64,0.1);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }

    .card-stars { color: var(--gold); font-size: 16px; letter-spacing: 1px; line-height: 1; }
    .no-rating  { font-size: 12px; color: var(--muted); font-style: italic; }

    .card-type-pill {
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 12px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* Pill colours per type */
    .pill-book     { background: #dce8ff; color: #1a3a6b; }
    .pill-app      { background: #e8d5ff; color: #4a1a6b; }
    .pill-tutorial { background: #fde8c8; color: #6b3a00; }
    .pill-website  { background: #d5f0e8; color: #0a4a2a; }

    .card-subject {
      font-size: 11px; color: var(--muted);
      font-style: italic; letter-spacing: 0.02em;
    }

    .card-headline {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 600;
      color: var(--sage-dk); line-height: 1.35;
    }

    .card-body {
      font-size: 14px; color: var(--text);
      line-height: 1.65; flex: 1;
    }

    .card-body.clamped {
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .read-more {
      background: none; border: none; color: var(--sage);
      font-size: 12px; cursor: pointer; padding: 0;
      font-family: 'Lato', sans-serif; font-weight: 700;
      letter-spacing: 0.05em; text-decoration: underline;
      text-underline-offset: 2px; margin-top: 4px;
    }

    .card-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      padding-top: 0.75rem;
      border-top: 1px solid #f0ebe0;
    }

    .card-reviewer { display: flex; align-items: center; gap: 8px; }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dk) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--cream); font-weight: 700; flex-shrink: 0;
    }

    .reviewer-info .name  { font-size: 13px; font-weight: 700; color: var(--text); }
    .reviewer-info .rtype { font-size: 11px; color: var(--muted); }

    .card-date { font-size: 11px; color: var(--muted); }

    /* ── Empty / loading ── */
    .state-box {
      text-align: center; padding: 4rem 1rem;
      color: var(--muted); grid-column: 1 / -1;
    }

    .state-box .icon { font-size: 40px; margin-bottom: 1rem; display: block; }
    .state-box p { font-size: 15px; }

    /* ── Leave a review CTA ── */
    .cta-bar {
      text-align: center;
      padding: 2rem 1.5rem;
      background: var(--white);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    .cta-bar p { font-size: 14px; color: var(--muted); margin-bottom: 0.75rem; }

    .cta-btn {
      display: inline-block; padding: 11px 28px;
      background: var(--sage-dk); color: var(--cream);
      border-radius: 8px; font-family: 'Lato', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; text-decoration: none;
      transition: background 0.2s;
    }

    .cta-btn:hover { background: #4d7450; }

    /* ── Footer ── */
    .footer {
      text-align: center; padding: 1.5rem;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .footer a { color: var(--sage-dk); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .summary-divider { display: none; }
      .review-grid { grid-template-columns: 1fr; }
      .type-tabs { gap: 6px; }
      .type-tab { padding: 8px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-logo">R</div>
  <h1>Reviews &amp; Feedback</h1>
  <p>RLB DESIGNS · RLBDESIGNS.COM</p>
  <div class="hero-divider"></div>
</div>

<!-- Summary bar -->
<div class="summary-bar">
  <div class="summary-stat">
    <div class="num" id="total-count">—</div>
    <div class="lbl">Total Reviews</div>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-stat">
    <div class="summary-stars" id="avg-stars">★★★★★</div>
    <div class="lbl" id="avg-label">Average Rating</div>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-stat">
    <div class="num" id="five-star-count">—</div>
    <div class="lbl">5-Star Reviews</div>
  </div>
</div>

<!-- Main content -->
<div class="main">

  <!-- Top-level type tabs -->
  <div class="type-tabs" id="type-tabs">
    <button class="type-tab active" data-type="All" onclick="selectType('All', this)">
      <span class="tab-icon">✦</span> All Reviews
      <span class="tab-count" id="count-All">0</span>
    </button>
    <button class="type-tab" data-type="Book" onclick="selectType('Book', this)">
      <span class="tab-icon">📚</span> Books
      <span class="tab-count" id="count-Book">0</span>
    </button>
    <button class="type-tab" data-type="Creator App" onclick="selectType('Creator App', this)">
      <span class="tab-icon">📱</span> Creator Apps
      <span class="tab-count" id="count-Creator App">0</span>
    </button>
    <button class="type-tab" data-type="Tutorial" onclick="selectType('Tutorial', this)">
      <span class="tab-icon">🎓</span> Tutorials
      <span class="tab-count" id="count-Tutorial">0</span>
    </button>
    <button class="type-tab" data-type="Website / Blog" onclick="selectType('Website / Blog', this)">
      <span class="tab-icon">🌐</span> Website / Blog
      <span class="tab-count" id="count-Website / Blog">0</span>
    </button>
  </div>

  <!-- Sub-category filter (Books only) -->
  <div class="sub-filter" id="sub-filter">
    <div class="sub-filter-inner" id="sub-filter-inner"></div>
  </div>

  <!-- Review cards -->
  <div class="review-grid" id="review-grid">
    <div class="state-box">
      <span class="icon">✦</span>
      <p>Loading reviews…</p>
    </div>
  </div>

</div>

<!-- CTA -->
<div class="cta-bar">
  <p>Have you read one of our books or used one of our apps?</p>
  <a class="cta-btn" href="./index.html">Leave a Review ✦</a>
</div>

<div class="footer">
  &copy; 2025 <a href="https://www.rlbdesigns.com">RLB Designs</a> · All Rights Reserved
</div>

<script>
  // ── REPLACE with your deployed Apps Script URL ──
  var SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL';

  var allReviews    = [];
  var activeType    = 'All';
  var activeSubCat  = 'All';

  /* ── Book sub-categories ── */
  var bookSubCats = [
    'All Books',
    "Children's Books",
    'Cookbooks',
    'Coloring Books',
    'Journals'
  ];

  var bookSubCatMap = {
    "Children's Books": ["Children's Book — Ages 0–4", "Children's Book — Ages 5–9", "Children's Book — Ages 9–13"],
    'Cookbooks':        ['Cookbook / Recipe Collection'],
    'Coloring Books':   ['Adult Coloring Book', "Children's Coloring Book", 'Zentangle / Mandala Book'],
    'Journals':         ['Writing Journal / Activity Book']
  };

  /* ── Pill class per type ── */
  function pillClass(type) {
    if (type === 'Book')           return 'pill-book';
    if (type === 'Creator App')    return 'pill-app';
    if (type === 'Tutorial')       return 'pill-tutorial';
    if (type === 'Website / Blog') return 'pill-website';
    return 'pill-book';
  }

  /* ── Subject line per review type ── */
  function subjectLine(r) {
    if (r.reviewType === 'Book')           return '📖 ' + (r.bookTitle || r.bookCategory || 'RLB Book');
    if (r.reviewType === 'Creator App')    return '📱 ' + (r.appName || 'Creator App');
    if (r.reviewType === 'Tutorial')       return '🎓 ' + (r.tutorialName || r.tutorialTopic || 'Tutorial');
    if (r.reviewType === 'Website / Blog') return '🌐 ' + (r.websiteArea || 'Website');
    return '';
  }

  /* ── Load reviews ── */
  async function loadReviews() {
    var grid = document.getElementById('review-grid');

    if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL') {
      grid.innerHTML = '<div class="state-box"><span class="icon">⚙️</span><p><strong>Setup needed:</strong> Replace YOUR_APPS_SCRIPT_URL in reviews.html with your deployed Apps Script URL.</p></div>';
      updateSummary([]);
      return;
    }

    try {
      var res  = await fetch(SCRIPT_URL + '?t=' + Date.now());
      var data = await res.json();
      allReviews = data.reviews || [];
      updateSummary(allReviews);
      updateTypeCounts(allReviews);
      buildSubFilter();
      renderReviews(getFiltered());
    } catch (err) {
      grid.innerHTML = '<div class="state-box"><span class="icon">⚠️</span><p>Could not load reviews. Please check back soon.</p></div>';
    }
  }

  /* ── Update summary stats ── */
  function updateSummary(reviews) {
    document.getElementById('total-count').textContent    = reviews.length;
    document.getElementById('five-star-count').textContent = reviews.filter(function(r) { return r.rating === 5; }).length;

    var rated = reviews.filter(function(r) { return r.rating > 0; });
    if (rated.length) {
      var avg    = rated.reduce(function(s, r) { return s + r.rating; }, 0) / rated.length;
      var filled = Math.round(avg);
      document.getElementById('avg-stars').textContent = '★'.repeat(filled) + '☆'.repeat(5 - filled);
      document.getElementById('avg-label').textContent = 'Avg ' + avg.toFixed(1) + ' / 5';
    }
  }

  /* ── Update type tab counts ── */
  function updateTypeCounts(reviews) {
    var types = ['All', 'Book', 'Creator App', 'Tutorial', 'Website / Blog'];
    types.forEach(function(t) {
      var el = document.getElementById('count-' + t);
      if (el) {
        var count = t === 'All' ? reviews.length : reviews.filter(function(r) { return r.reviewType === t; }).length;
        el.textContent = count;
      }
    });
  }

  /* ── Build book sub-filter buttons ── */
  function buildSubFilter() {
    var inner = document.getElementById('sub-filter-inner');
    inner.innerHTML = '';
    bookSubCats.forEach(function(cat, i) {
      var btn = document.createElement('button');
      btn.className   = 'sub-btn' + (i === 0 ? ' active' : '');
      btn.textContent = cat;
      btn.onclick     = function() {
        document.querySelectorAll('.sub-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeSubCat = cat;
        renderReviews(getFiltered());
      };
      inner.appendChild(btn);
    });
  }

  /* ── Select top-level type ── */
  function selectType(type, btn) {
    activeType   = type;
    activeSubCat = 'All Books';

    document.querySelectorAll('.type-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');

    /* Show sub-filter only for Books */
    var subFilter = document.getElementById('sub-filter');
    if (type === 'Book') {
      subFilter.classList.add('visible');
      /* Reset sub-filter to All Books */
      document.querySelectorAll('.sub-btn').forEach(function(b, i) {
        b.classList.toggle('active', i === 0);
      });
    } else {
      subFilter.classList.remove('visible');
    }

    renderReviews(getFiltered());
  }

  /* ── Get filtered reviews ── */
  function getFiltered() {
    var filtered = allReviews;

    /* Filter by type */
    if (activeType !== 'All') {
      filtered = filtered.filter(function(r) { return r.reviewType === activeType; });
    }

    /* Filter by book sub-category */
    if (activeType === 'Book' && activeSubCat !== 'All Books') {
      var cats = bookSubCatMap[activeSubCat] || [];
      filtered = filtered.filter(function(r) { return cats.indexOf(r.bookCategory) !== -1; });
    }

    return filtered;
  }

  /* ── Render review cards ── */
  function renderReviews(reviews) {
    var grid = document.getElementById('review-grid');

    if (!reviews.length) {
      grid.innerHTML = '<div class="state-box"><span class="icon">✦</span><p>No reviews in this category yet — be the first!</p></div>';
      return;
    }

    grid.innerHTML = reviews.map(function(r, i) {
      var starsHtml = r.rating > 0
        ? '<span class="card-stars">' + '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating) + '</span>'
        : '<span class="no-rating">No rating</span>';

      var initial    = (r.displayName || 'R')[0].toUpperCase();
      var dateStr    = formatDate(r.timestamp);
      var subject    = subjectLine(r);
      var pClass     = pillClass(r.reviewType);
      var typeLabel  = r.reviewType || 'Review';
      var bodyId     = 'body-' + i;
      var btnId      = 'btn-' + i;
      var longBody   = (r.reviewBody || '').length > 280;

      return '<div class="review-card" style="animation-delay:' + (i * 0.04) + 's">' +

        '<div class="card-top">' +
          starsHtml +
          '<span class="card-type-pill ' + pClass + '">' + escHtml(typeLabel) + '</span>' +
        '</div>' +

        '<div class="card-subject">' + escHtml(subject) + '</div>' +

        '<div class="card-headline">' + escHtml(r.reviewHeadline || '') + '</div>' +

        '<div class="card-body' + (longBody ? ' clamped' : '') + '" id="' + bodyId + '">' +
          escHtml(r.reviewBody || '') +
        '</div>' +

        (longBody ? '<button class="read-more" id="' + btnId + '" onclick="toggleBody(\'' + bodyId + '\',\'' + btnId + '\')">Read more →</button>' : '') +

        '<div class="card-footer">' +
          '<div class="card-reviewer">' +
            '<div class="avatar">' + initial + '</div>' +
            '<div class="reviewer-info">' +
              '<div class="name">' + escHtml(r.displayName || 'A Reader') + '</div>' +
              (r.readerType ? '<div class="rtype">' + escHtml(r.readerType) + '</div>' : '') +
            '</div>' +
          '</div>' +
          '<div class="card-date">' + dateStr + '</div>' +
        '</div>' +

      '</div>';
    }).join('');
  }

  /* ── Helpers ── */
  function formatDate(ts) {
    if (!ts) return '';
    try { return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
    catch(e) { return ''; }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function toggleBody(bodyId, btnId) {
    var body    = document.getElementById(bodyId);
    var btn     = document.getElementById(btnId);
    var clamped = body.classList.toggle('clamped');
    btn.textContent = clamped ? 'Read more →' : 'Show less ↑';
  }

  /* ── Init ── */
  loadReviews();
</script>

</body>
</html>
